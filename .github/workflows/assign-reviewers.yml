name: 'Assign reviewers'

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [ opened, ready_for_review ]

jobs:
  assign-reviewers:
    runs-on: ubuntu-latest

    steps:
      - uses: kentaro-m/auto-assign-action@v2.0.0
        with:
          repo-token: '${{ github.token }}'
