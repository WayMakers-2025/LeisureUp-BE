name: CD prod

# disabled due to blue/green cd
on: workflow_dispatch

permissions:
  contents: read
  issues: read
  checks: write
  pull-requests: write

jobs:
  run-test-for-validation:
    uses: ./.github/workflows/run-test.yaml
    with:
      comment-test-result: false
    secrets:
      common-test-secret: ${{ secrets.COMMON_TEST_SECRET }}

  push-image:
    needs: run-test-for-validation
    uses: ./.github/workflows/push-docker-image.yaml
    with:
      tags: "${{ github.ref_name }}-${{ github.sha }}"
    secrets:
      docker-hub-id: ${{ secrets.DOCKER_HUB_ID }}
      docker-hub-pw: ${{ secrets.DOCKER_HUB_PW }}
      common-secret: ${{ secrets.COMMON_SECRET }}
      prod-secret: ${{ secrets.PROD_SECRET }}
      staging-secret: ${{ secrets.STAGING_SECRET }}

  down-application:
    needs: run-test-for-validation
    uses: ./.github/workflows/down-application-jump-host.yaml
    with:
      compose-file-name: 'docker-compose.prod.yaml'
    secrets:
      jump-host-address: ${{ secrets.PROD_BASTION_ADDRESS }}
      jump-host-id: ${{ secrets.PROD_BASTION_ID }}
      jump-host-key: ${{ secrets.PROD_BASTION_KEY }}
      remote-host-address: ${{ secrets.PROD_APPLICATION_ADDRESS }}
      remote-host-id: ${{ secrets.PROD_APPLICATION_ID }}
      remote-host-key: ${{ secrets.PROD_APPLICATION_KEY }}

  up-application:
    needs:
      - push-image
      - down-application
    uses: ./.github/workflows/up-application-jump-host.yaml
    with:
      compose-file-name: 'docker-compose.prod.yaml'
      image-tag: "${{ github.ref_name }}-${{ github.sha }}"
    secrets:
      jump-host-address: ${{ secrets.PROD_BASTION_ADDRESS }}
      jump-host-id: ${{ secrets.PROD_BASTION_ID }}
      jump-host-key: ${{ secrets.PROD_BASTION_KEY }}
      remote-host-address: ${{ secrets.PROD_APPLICATION_ADDRESS }}
      remote-host-id: ${{ secrets.PROD_APPLICATION_ID }}
      remote-host-key: ${{ secrets.PROD_APPLICATION_KEY }}
      docker-hub-id: ${{ secrets.DOCKER_HUB_ID }}
      docker-hub-pw: ${{ secrets.DOCKER_HUB_PW }}
