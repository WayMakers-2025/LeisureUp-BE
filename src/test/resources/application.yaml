spring:
  application.name: LeisureUp-BE
  threads.virtual.enabled: true

  profiles:
    default: test
    group:
      test:
        - common-test-secret

  datasource:
    url: jdbc:h2:mem:test

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        globally_quoted_identifiers: true

  data:
    redis:
      host: localhost
      port: 6379
      password:

feign:
  tour-api:
    url: http://apis.data.go.kr/B551011/KorService2
  openid:
    google: https://openidconnect.googleapis.com
    kakao: https://kapi.kakao.com
  weather:
    warning: http://apis.data.go.kr/1360000/WthrWrnInfoService
    forecast: http://apis.data.go.kr/1360000/MidFcstInfoService

mdc-key:
  request-id: request-id
  trace-id: trace-id

logging:
  #  level:
  #    org.hibernate.SQL: debug
  #    org.springframework.transaction: trace
  pattern:
    dateformat: yyyy-MM-dd'T'HH:mm:ss.SSSz,Asia/Seoul
    level: '[RID:%10X{${mdc-key.request-id}}] [TID:%10X{${mdc-key.trace-id}}] %5p'
