spring:
  application.name: LeisureUp-BE
  threads.virtual.enabled: true

  profiles:
    default: local
    group:
      local:
        - common-secret
        - local-secret
        - init-categories
      staging:
        - common-secret
        - staging-secret
      prod:
        - common-secret
        - prod-secret

  datasource:
    url: ${db.url}
    username: ${db.username}
    password: ${db.password}

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        globally_quoted_identifiers: true

  data:
    redis:
      host: localhost
      port: 6379
      password:

  cloud.openfeign.client.config.default:
    logger-level: full

springdoc:
  cache.disabled: true
  api-docs.groups.enabled: true

  swagger-ui:
    enabled: true
    path: /api-doc
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true

  api-docs.path: /api-doc

  default-consumes-media-type: application/json;charset=UTF-8
  default-produces-media-type: application/json;charset=UTF-8
  show-oauth2-endpoints: true
  show-actuator: true
  show-login-endpoint: true
  paths-to-match: /**

feign:
  tour-api:
    url: http://apis.data.go.kr/B551011/KorService2
  openid:
    google: https://openidconnect.googleapis.com
    kakao: https://kapi.kakao.com

logging:
  level:
    org.hibernate.SQL: debug
  pattern:
    dateformat: yyyy-MM-dd'T'HH:mm:ss.SSSz,Asia/Seoul
